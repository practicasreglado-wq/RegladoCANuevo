    const img = new Image();

    // ============================================================================
    //  EXTRACCIÓN DE LA SILUETA Y EXTRUSIÓN VOLUMÉTRICA
    // ============================================================================
    function buildSolid(image) {
      // 1) Pasamos la imagen a una máscara binaria con resolución suficiente para
      //    capturar las curvas calígraficas pero no tan alta que la geometría
      //    resulte excesivamente densa.
      const RES = 280;
      const c = document.createElement('canvas');
      c.width = c.height = RES;
      const ctx = c.getContext('2d');
      const scale = (RES * 0.94) / Math.max(image.width, image.height);
      const w = image.width * scale, h = image.height * scale;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, RES, RES);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(image, (RES - w) / 2, (RES - h) / 2, w, h);

      const data = ctx.getImageData(0, 0, RES, RES).data;
      const mask = new Uint8Array(RES * RES);
      for (let i = 0, p = 0; i < RES * RES; i++, p += 4) {
        const lum = (data[p] + data[p + 1] + data[p + 2]) / 3;
        mask[i] = lum < 130 ? 1 : 0;
      }

      // 2) MARCHING SQUARES.
      //    Para cada celda 2×2, miramos los cuatro vértices: cada uno está
      //    "dentro" o "fuera" de la silueta. Las 16 configuraciones posibles
      //    determinan qué bordes de la celda atraviesa el contorno.
      //    Bordes:  0=arriba  1=derecha  2=abajo  3=izquierda
      const segs = [];
      const mid = (cx, cy, e) => {
        if (e === 0) return { x: cx + 0.5, y: cy };
        if (e === 1) return { x: cx + 1, y: cy + 0.5 };
        if (e === 2) return { x: cx + 0.5, y: cy + 1 };
        return { x: cx, y: cy + 0.5 };
      };
      const seg = (cx, cy, a, b) => segs.push({ a: mid(cx, cy, a), b: mid(cx, cy, b) });

      for (let cy = 0; cy < RES - 1; cy++) {
        for (let cx = 0; cx < RES - 1; cx++) {
          const tl = mask[cy * RES + cx];
          const tr = mask[cy * RES + cx + 1];
          const br = mask[(cy + 1) * RES + cx + 1];
          const bl = mask[(cy + 1) * RES + cx];
          const idx = tl | (tr << 1) | (br << 2) | (bl << 3);
          switch (idx) {
            case 1: seg(cx, cy, 3, 0); break;
            case 2: seg(cx, cy, 0, 1); break;
            case 3: seg(cx, cy, 3, 1); break;
            case 4: seg(cx, cy, 1, 2); break;
            case 5: seg(cx, cy, 3, 0); seg(cx, cy, 1, 2); break;   // silla 1
            case 6: seg(cx, cy, 0, 2); break;
            case 7: seg(cx, cy, 3, 2); break;
            case 8: seg(cx, cy, 2, 3); break;
            case 9: seg(cx, cy, 2, 0); break;
            case 10: seg(cx, cy, 0, 1); seg(cx, cy, 2, 3); break;   // silla 2
            case 11: seg(cx, cy, 2, 1); break;
            case 12: seg(cx, cy, 1, 3); break;
            case 13: seg(cx, cy, 1, 0); break;
            case 14: seg(cx, cy, 0, 3); break;
          }
        }
      }

      // 3) CONECTAR LOS SEGMENTOS EN BUCLES CERRADOS.
      //    Cada punto medio de borde es compartido por exactamente dos segmentos
      //    (uno entrante, uno saliente). Indexamos por el extremo "a" y vamos
      //    encadenando.
      const KEY = p => p.x + ',' + p.y;
      const bucket = new Map();
      segs.forEach((s, i) => {
        const k = KEY(s.a);
        let arr = bucket.get(k);
        if (!arr) { arr = []; bucket.set(k, arr); }
        arr.push(i);
      });

      const used = new Uint8Array(segs.length);
      const rawContours = [];

      for (let i = 0; i < segs.length; i++) {
        if (used[i]) continue;
        const ring = [segs[i].a];
        let cur = i;
        used[i] = 1;
        let safety = 0;
        while (safety++ < segs.length + 1) {
          const s = segs[cur];
          ring.push(s.b);
          if (KEY(s.b) === KEY(ring[0])) break;
          const cand = bucket.get(KEY(s.b));
          if (!cand) break;
          let nx = -1;
          for (const ci of cand) { if (!used[ci]) { nx = ci; break; } }
          if (nx === -1) break;
          used[nx] = 1;
          cur = nx;
        }
        if (ring.length >= 4) rawContours.push(ring);
      }

      // 4) PASO A COORDENADAS DE ESCENA (e inversión de Y, porque en imagen
      //    Y crece hacia abajo y en 3D crece hacia arriba).
      const PLANE = 4.2;
      const toScene = p => ({
        x: (p.x / RES - 0.5) * PLANE,
        y: -(p.y / RES - 0.5) * PLANE,
      });
      const contours = rawContours.map(r => {
        const c = r.map(toScene);
        // Quitar el último si coincide con el primero
        const a = c[0], b = c[c.length - 1];
        if (a.x === b.x && a.y === b.y) c.pop();
        return c;
      }).filter(c => c.length >= 3);

      // 5) ÁREA CON SIGNO PARA SEPARAR CONTORNOS EXTERIORES DE HUECOS.
      const signedArea = c => {
        let A = 0;
        for (let i = 0; i < c.length; i++) {
          const p = c[i], q = c[(i + 1) % c.length];
          A += p.x * q.y - q.x * p.y;
        }
        return A / 2;
      };
      const ann = contours.map(c => ({ pts: c, A: signedArea(c) }));
      ann.sort((a, b) => Math.abs(b.A) - Math.abs(a.A));
      const exteriorSign = Math.sign(ann[0].A);  // el contorno mayor define el signo del exterior

      const exteriors = [];
      const holes = [];
      for (const c of ann) {
        if (Math.abs(c.A) < 1e-6) continue;
        if (Math.sign(c.A) === exteriorSign) exteriors.push({ pts: c.pts, area: Math.abs(c.A) });
        else holes.push({ pts: c.pts });
      }

      // 6) ASIGNAR CADA HUECO A SU CONTORNO EXTERIOR (el más pequeño que lo contiene).
      const pip = (p, poly) => {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
          const a = poly[i], b = poly[j];
          if (((a.y > p.y) !== (b.y > p.y)) &&
            (p.x < (b.x - a.x) * (p.y - a.y) / (b.y - a.y) + a.x))
            inside = !inside;
        }
        return inside;
      };
      exteriors.forEach(e => e.holes = []);
      for (const h of holes) {
        let parent = null, parentArea = Infinity;
        for (const e of exteriors) {
          if (pip(h.pts[0], e.pts) && e.area < parentArea) {
            parent = e;
            parentArea = e.area;
          }
        }
        if (parent) parent.holes.push(h.pts);
      }

      // 7) SUAVIZADO DE LOS CONTORNOS.
      //    Marching squares devuelve polilíneas escalonadas siguiendo la
      //    cuadrícula de píxeles. Para que las trazas calígraficas del logotipo
      //    se lean como curvas y no como dientes de sierra, encadenamos:
      //    a) DECIMACIÓN POR UMBRAL ANGULAR — descartamos los puntos cuyo
      //       ángulo de inflexión respecto a sus vecinos es prácticamente
      //       nulo, es decir, los puntos que sólo "rellenan" tramos rectos.
      //    b) ALGORITMO DE CHAIKIN — sustituimos cada arista por dos puntos
      //       situados a un cuarto y a tres cuartos del segmento. Iterado,
      //       converge hacia una curva B-spline cuadrática suave; con dos
      //       pasadas las esquinas pixeladas desaparecen.
      const simplify = (pts, minAngle) => {
        const n = pts.length;
        if (n < 4) return pts;
        const keep = new Uint8Array(n);
        for (let i = 0; i < n; i++) {
          const a = pts[(i - 1 + n) % n], b = pts[i], c = pts[(i + 1) % n];
          const v1x = b.x - a.x, v1y = b.y - a.y;
          const v2x = c.x - b.x, v2y = c.y - b.y;
          const cross = v1x * v2y - v1y * v2x;
          const dot = v1x * v2x + v1y * v2y;
          const ang = Math.abs(Math.atan2(cross, dot));
          if (ang >= minAngle) keep[i] = 1;
        }
        const out = [];
        for (let i = 0; i < n; i++) if (keep[i]) out.push(pts[i]);
        return out.length >= 3 ? out : pts;
      };
      const chaikin = (pts, iters) => {
        let r = pts;
        for (let k = 0; k < iters; k++) {
          const n = r.length;
          const next = new Array(n * 2);
          for (let i = 0; i < n; i++) {
            const a = r[i], b = r[(i + 1) % n];
            next[2 * i] = { x: 0.75 * a.x + 0.25 * b.x, y: 0.75 * a.y + 0.25 * b.y };
            next[2 * i + 1] = { x: 0.25 * a.x + 0.75 * b.x, y: 0.25 * a.y + 0.75 * b.y };
          }
          r = next;
        }
        return r;
      };
      const smooth = ring => chaikin(simplify(ring, 0.05), 2);

      // 8) CONSTRUIR LOS THREE.SHAPE Y EXTRUIR.
      const shapes = [];
      for (const e of exteriors) {
        const outer = smooth(e.pts);
        const sh = new THREE.Shape();
        sh.moveTo(outer[0].x, outer[0].y);
        for (let i = 1; i < outer.length; i++) sh.lineTo(outer[i].x, outer[i].y);
        for (const hole of e.holes) {
          const inner = smooth(hole);
          const path = new THREE.Path();
          path.moveTo(inner[0].x, inner[0].y);
          for (let i = 1; i < inner.length; i++) path.lineTo(inner[i].x, inner[i].y);
          sh.holes.push(path);
        }
        shapes.push(sh);
      }

      const DEPTH = 0.22;        // profundidad real del sólido (reducida)
      const settings = {
        depth: DEPTH,
        bevelEnabled: true,
        bevelSize: 0.008,
        bevelThickness: 0.008,
        bevelSegments: 2,
        curveSegments: 1,
        steps: 1,
      };
      const geo = new THREE.ExtrudeGeometry(shapes, settings);
      geo.translate(0, 0, -DEPTH / 2);          // centramos en Z
      geo.computeVertexNormals();

      // Material doble para el sólido extruido.
      // ExtrudeGeometry crea internamente DOS grupos de caras:
      //   · grupo 0 → las tapas (anverso y reverso del sólido)
      //   · grupo 1 → los costados (la profundidad lateral)
      // Si pasamos al Mesh un array de dos materiales, Three.js asignará el
      // primer material al grupo 0 y el segundo al grupo 1, lo que nos
      // permite colorear las caras y la profundidad de forma independiente.
      const matBase = {
        roughness: 0.55,
        metalness: 0.05,
        side: THREE.FrontSide,
      };
      const matFace = new THREE.MeshStandardMaterial({ ...matBase, color: 0x444444 });
      const matSide = new THREE.MeshStandardMaterial({ ...matBase, color: 0x222222 }); const solid = new THREE.Mesh(geo, [matFace, matSide]);
      spinGroup.add(solid);

      // (Eje retirado en modo embed — sólo se muestra el sólido extruido.)

      // 9) Sombra ambiental bajo la pieza.
      const sc = document.createElement('canvas'); sc.width = sc.height = 256;
      const sctx = sc.getContext('2d');
      const grad = sctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, 'rgba(0,0,0,0.3)');
      grad.addColorStop(0.55, 'rgba(0,0,0,0.08)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      sctx.fillStyle = grad; sctx.fillRect(0, 0, 256, 256);
      const shadowMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(sc), transparent: true, depthWrite: false });
      const shadow = new THREE.Mesh(new THREE.PlaneGeometry(5.2, 1.6), shadowMat);
      shadow.position.set(0, -2.7, 0);
      shadow.rotation.x = -Math.PI / 2.3;
      scene.add(shadow);

      startInteraction();
    }

    // ============================================================================
    //  Modo embed: sin paneles, sin arrastre. Sólo escuchamos mensajes del padre
    //  para girar la pieza y un bucle de render mínimo.
    // ============================================================================
    function startInteraction() {
      // Mantenemos `target` para conservar el tilt base (la rotación X/Y inicial).
      const target = { x: tiltGroup.rotation.x, y: tiltGroup.rotation.y };

      // ---------- Bucle de animación (modo embed: rotación controlada por scroll) ----------
      // El parent envía mensajes { type: 'reglado-spin', delta } donde delta es el incremento
      // angular en radianes. Positivo = horario; negativo = antihorario.
      let scrollSpinTarget = 0;   // ángulo objetivo absoluto en radianes (eje Z)
      let scrollSpinCurrent = 0;  // ángulo actual interpolado (eje Z)
      let idleSpinAccum = 0;      // rotación continua por tiempo (eje Z)
      let xSpinAccum = 0;         // rotación continua lenta por tiempo (eje X)

      window.addEventListener('message', (e) => {
        const data = e.data || {};
        if (data.type === 'reglado-spin' && typeof data.delta === 'number') {
          scrollSpinTarget += data.delta;
        }
      });

      let prev = performance.now();
      function animate(now) {
        requestAnimationFrame(animate);
        const dt = Math.min(0.05, (now - prev) / 1000);
        prev = now;
        tiltGroup.rotation.x += (target.x - tiltGroup.rotation.x) * 0.18;
        tiltGroup.rotation.y += (target.y - tiltGroup.rotation.y) * 0.18;
        // Interpola hacia el target con suavizado (sentido del giro = signo del delta acumulado)
        scrollSpinCurrent += (scrollSpinTarget - scrollSpinCurrent) * 0.08;
        // Rotación autónoma moderada en Z (~0.45 rad/s ≈ una vuelta cada 14 s).
        // El scroll del padre se SUMA encima a través de scrollSpinCurrent.
        idleSpinAccum += dt * 0.45;
        spinGroup.rotation.z = scrollSpinCurrent + idleSpinAccum;
        // Rotación autónoma LENTA en X (~0.15 rad/s ≈ una vuelta cada 42 s),
        // independiente del scroll: aporta sensación tridimensional.
        xSpinAccum -= dt * 0.4;
        spinGroup.rotation.y = xSpinAccum;
        renderer.render(scene, camera);
      }
      requestAnimationFrame(animate);
    }

    // ---- Layout simple: el canvas siempre ocupa todo el iframe ----
    function updateCanvasLayout() {
      const wrap = document.getElementById('canvas-wrap');
      if (!wrap) return;
      wrap.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    updateCanvasLayout();
    window.addEventListener('resize', updateCanvasLayout);
  </script>
</body>
