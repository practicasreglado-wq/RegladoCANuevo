<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas ES — Mapa Reglado</title>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#0a0e1a"/>
          <stop offset="1" stop-color="#141a2e"/>
        </linearGradient>
        <linearGradient id="ir" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#00d4ff"/>
          <stop offset=".5" stop-color="#b56bff"/>
          <stop offset="1" stop-color="#ff6bd6"/>
        </linearGradient>
      </defs>
      <rect width="100" height="100" fill="url(#bg)"/>
      <path d="M30 30 L60 25 L75 35 L72 55 L55 72 L35 70 L28 50 Z" fill="url(#ir)" opacity=".35" stroke="url(#ir)" stroke-width="1"/>
      <circle cx="78" cy="72" r="3" fill="url(#ir)" opacity=".6"/>
    </svg>
  </template>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #00d4ff;
      --accent-2: #b56bff;
      --accent-3: #ff6bd6;
      --bg-0: #05070f;
      --bg-1: #0a0e1a;
      --bg-2: #0f1424;
      --text: #e7ecf5;
      --text-dim: #8791a8;
      --font-display: 'Orbitron', 'Space Grotesk', sans-serif;
      --font-body: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(181,107,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 80% 90%, rgba(0,212,255,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 50% 50%, #0d1225 0%, var(--bg-0) 80%);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background FX canvases / overlays ─────────────────────────── */
    .fx-grid, .fx-scanlines, .fx-cursor-light, .fx-particles {
      position: absolute; inset: 0; pointer-events: none;
    }
    .fx-grid { z-index: 0; }
    .fx-cursor-light {
      position: fixed; width: 700px; height: 700px; z-index: 1;
      mix-blend-mode: screen; will-change: transform;
      filter: blur(30px);
    }
    .fx-scanlines {
      position: fixed; z-index: 5;
      background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
      mix-blend-mode: overlay;
    }
    .fx-particles { position: absolute; z-index: 3; pointer-events: none; }

    /* ── App chrome ────────────────────────────────────────────────── */
    .app-chrome {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 24px; pointer-events: none;
    }
    .brand { display: flex; align-items: center; gap: 14px; pointer-events: auto; }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 8px;
      box-shadow:
        0 0 0 .5px rgba(255,255,255,0.15) inset,
        0 0 20px rgba(0,212,255,0.4),
        0 4px 12px rgba(0,0,0,0.4);
      position: relative; overflow: hidden;
    }
    .brand-mark::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%);
      animation: shine 4s ease-in-out infinite;
    }
    @keyframes shine { 0%,100% { transform: translateX(-100%); } 50% { transform: translateX(100%); } }
    .brand-title {
      font-family: var(--font-display); font-weight: 700; letter-spacing: 0.22em;
      font-size: 13px; color: var(--text);
    }
    .brand-sub {
      font-family: var(--font-mono); font-size: 10.5px;
      color: var(--text-dim); letter-spacing: 0.05em; margin-top: 2px;
    }
    .hint {
      display: flex; align-items: center; gap: 10px; pointer-events: auto;
      font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim);
      letter-spacing: 0.04em; text-transform: lowercase;
    }
    .hint .kbd {
      padding: 3px 7px; border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 4px; background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px); color: var(--accent);
      font-family: var(--font-mono); font-size: 10px;
    }
    .hint .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 4px; }

    /* ── Map ──────────────────────────────────────────────────────── */
    .map-wrapper {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }
    .map-stage {
      flex: 1; position: relative; overflow: hidden;
    }
    .map-svg {
      width: 100%; height: 100%; display: block;
      position: relative; z-index: 2;
    }
    .regions-layer { transform-box: fill-box; }
    .region-fill {
      transition: fill 320ms cubic-bezier(.2,.9,.3,1),
                  stroke 320ms cubic-bezier(.2,.9,.3,1),
                  stroke-width 320ms cubic-bezier(.2,.9,.3,1);
    }
    .ctx-outline {
      fill: var(--accent); fill-opacity: 0.025;
      stroke: var(--accent); stroke-opacity: 0.18;
      stroke-width: 0.4; stroke-dasharray: 2 3;
      pointer-events: none;
    }
    .breathe {
      animation: breathe 2.4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.8; }
    }

    /* ── Breadcrumb ──────────────────────────────────────────────── */
    .breadcrumb {
      position: relative; z-index: 3;
      display: flex; align-items: center; gap: 10px;
      padding: 64px 24px 14px 24px;
      font-family: var(--font-display); font-size: 11px;
      letter-spacing: 0.14em; text-transform: uppercase;
    }
    .bc-back {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 0.5px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      color: var(--accent); cursor: pointer;
      transition: all 200ms cubic-bezier(.2,1,.3,1);
    }
    .bc-back:not(:disabled):hover {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 14px rgba(0,212,255,0.3), 0 0 2px var(--accent);
      transform: translateX(-2px);
    }
    .bc-back:disabled { opacity: 0.25; cursor: default; }
    .bc-item {
      background: none; border: 0; color: var(--text-dim);
      font: inherit; text-transform: inherit; letter-spacing: inherit;
      cursor: pointer; padding: 4px 2px;
      transition: color 200ms, text-shadow 200ms;
    }
    .bc-item:hover { color: var(--text); }
    .bc-item.active {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(0,212,255,0.6);
    }
    .bc-sep {
      color: var(--accent); opacity: 0.4; font-size: 8px;
      filter: drop-shadow(0 0 4px var(--accent));
    }
    .bc-level-tag {
      margin-left: auto;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); letter-spacing: 0.18em;
      padding: 4px 10px;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.02);
    }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    .tooltip {
      position: absolute; pointer-events: none; z-index: 40;
      padding: 10px 14px;
      min-width: 140px;
      background: linear-gradient(135deg, rgba(15,20,36,0.85), rgba(15,20,36,0.65));
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow:
        0 0 0 0.5px var(--accent) inset,
        0 0 20px rgba(0,212,255,0.15),
        0 10px 30px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(4px) scale(0.96);
      transition: opacity 180ms, transform 180ms cubic-bezier(.2,1,.3,1);
    }
    .tooltip.visible { opacity: 1; transform: translateY(0) scale(1); }
    .tooltip .tt-sub {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
      opacity: 0.8;
    }
    .tooltip .tt-name {
      font-family: var(--font-display); font-weight: 500; font-size: 13px;
      color: var(--text); margin-top: 3px; letter-spacing: 0.03em;
    }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      position: absolute; bottom: 22px; right: 22px; z-index: 30;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(15,20,36,0.55);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      font-family: var(--font-mono); font-size: 11px;
    }
    .lg-dot { width: 8px; height: 8px; border-radius: 50%; }
    .lg-count {
      font-family: var(--font-display); font-weight: 700;
      font-size: 16px; color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .lg-label { color: var(--text-dim); letter-spacing: 0.08em; }

    /* ── Loading ─────────────────────────────────────────────────── */
    .loading {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(5,7,15,0.6); z-index: 50; backdrop-filter: blur(2px);
    }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent); border-right-color: var(--accent-2);
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Enclave pulse (Ceuta/Melilla badges) ─────────────────── */
    .enclave-pulse {
      transform-origin: center;
      transform-box: fill-box;
      animation: enclavePulse 2.2s ease-out infinite;
      opacity: 0.9;
    }
    @keyframes enclavePulse {
      0%   { transform: scale(1);   opacity: 0.9; }
      100% { transform: scale(2.4); opacity: 0;   }
    }

    /* ── Idle ambient pulse ─────────────────────────── */
    .idle-pulse {
      animation: idlePulse 1.1s ease-out forwards;
    }
    @keyframes idlePulse {
      0%   { opacity: 0; }
      30%  { opacity: 0.7; }
      100% { opacity: 0; }
    }

    /* ── Floating region labels ─────────────────────── */
    .region-label { transition: opacity 220ms ease; }
    .lbl-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      fill: rgba(231, 236, 245, 0.85);
    }
    .lbl-halo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      fill: none;
      stroke: rgba(5, 7, 15, 0.9);
      stroke-width: 3.5;
      stroke-linejoin: round;
      paint-order: stroke;
    }
    .region-label.lbl-hover .lbl-text {
      fill: var(--accent);
      filter: drop-shadow(0 0 4px var(--accent));
    }

    /* ── Minimap ──────────────────────────────────── */
    .minimap {
      position: absolute; bottom: 22px; left: 22px; z-index: 30;
      width: 184px;
      padding: 10px 12px 8px 12px;
      background: linear-gradient(180deg, rgba(15,20,36,0.75), rgba(10,14,26,0.75));
      border: 0.5px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      box-shadow: 0 0 0 0.5px rgba(0,212,255,0.15) inset, 0 8px 24px rgba(0,0,0,0.4);
    }
    .mm-title {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-display);
      font-size: 9.5px; font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .mm-pulse {
      width: 5px; height: 5px; border-radius: 50%;
      animation: mmPulse 1.8s ease-in-out infinite;
    }
    @keyframes mmPulse {
      0%,100% { opacity: 0.5; transform: scale(1); }
      50%     { opacity: 1;   transform: scale(1.4); }
    }
    .mm-svg { display: block; width: 100%; height: auto; }
    .mm-level {
      display: flex; justify-content: center; gap: 10px;
      margin-top: 4px;
      font-size: 7px;
      transition: color 300ms ease;
    }
    .mm-chev { font-size: 6px; transition: color 300ms ease, text-shadow 300ms ease; }

    /* ── Search ──────────────────────────────────────────────── */
    .search-trigger {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 25;
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px 9px 12px;
      min-width: 260px;
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(15,20,36,0.55);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      color: var(--text-dim);
      font-family: var(--font-body); font-size: 12px;
      cursor: pointer;
      transition: all 220ms cubic-bezier(.2,1,.3,1);
    }
    .search-trigger:hover {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 20px rgba(0,212,255,0.2), 0 0 0 0.5px var(--accent) inset;
      transform: translateX(-50%) translateY(1px);
    }
    .search-trigger svg { color: var(--accent); }
    .st-label { flex: 1; text-align: left; letter-spacing: 0.02em; }
    .st-kbd {
      font-family: var(--font-mono); font-size: 10px;
      padding: 2px 7px; border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 4px; background: rgba(255,255,255,0.03);
      color: var(--text-dim);
    }

    .search-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(5,7,15,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 12vh;
      opacity: 0; pointer-events: none;
      transition: opacity 220ms ease;
    }
    .search-overlay.open { opacity: 1; pointer-events: auto; }
    .search-modal {
      width: min(560px, 92vw);
      background: linear-gradient(180deg, rgba(22,28,48,0.95), rgba(12,16,30,0.95));
      border: 0.5px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      box-shadow:
        0 0 0 0.5px var(--accent) inset,
        0 0 40px rgba(0,212,255,0.15),
        0 30px 80px rgba(0,0,0,0.6);
      overflow: hidden;
      transform: translateY(-8px) scale(0.98);
      opacity: 0.5;
      transition: all 260ms cubic-bezier(.2,1.1,.3,1);
    }
    .search-overlay.open .search-modal { transform: translateY(0) scale(1); opacity: 1; }
    .sm-header {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 18px 16px 18px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(0,212,255,0.04), transparent);
    }
    .sm-header input {
      flex: 1; background: none; border: 0; outline: none;
      color: var(--text);
      font-family: var(--font-display); font-weight: 500; font-size: 17px;
      letter-spacing: 0.02em;
    }
    .sm-header input::placeholder { color: var(--text-dim); font-weight: 400; }
    .sm-esc {
      font-family: var(--font-mono); font-size: 10px;
      padding: 3px 8px; border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 4px; background: rgba(255,255,255,0.03);
      color: var(--text-dim); letter-spacing: 0.1em;
    }
    .sm-results {
      max-height: 58vh; overflow-y: auto;
      padding: 6px;
    }
    .sm-results::-webkit-scrollbar { width: 6px; }
    .sm-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .sm-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      grid-template-areas: 'name arrow' 'path arrow';
      gap: 3px 12px;
      padding: 11px 14px;
      background: none; border: 0; outline: none;
      border-radius: 10px;
      cursor: pointer; text-align: left;
      color: var(--text);
      transition: background 140ms ease;
    }
    .sm-row.hi {
      background: linear-gradient(90deg, rgba(0,212,255,0.10), rgba(181,107,255,0.06));
      box-shadow: inset 0 0 0 0.5px rgba(0,212,255,0.3);
    }
    .sm-row-name {
      grid-area: name;
      font-family: var(--font-display); font-weight: 500; font-size: 14px;
      letter-spacing: 0.01em;
    }
    .sm-hl {
      color: var(--accent);
      background: rgba(0,212,255,0.08);
      padding: 0 2px;
      border-radius: 2px;
    }
    .sm-row-path {
      grid-area: path;
      font-family: var(--font-mono); font-size: 10.5px;
      color: var(--text-dim); letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 6px;
    }
    .sm-dot { opacity: 0.4; }
    .sm-ccaa { color: var(--accent); opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em; font-size: 9.5px; }
    .sm-row-arrow {
      grid-area: arrow; align-self: center;
      font-family: var(--font-mono); font-size: 12px;
      color: var(--accent); opacity: 0;
      transition: opacity 140ms ease;
    }
    .sm-row.hi .sm-row-arrow { opacity: 1; }
    .sm-empty {
      padding: 40px 20px; text-align: center;
    }
    .sm-empty-t { font-family: var(--font-display); font-size: 14px; color: var(--text); letter-spacing: 0.04em; }
    .sm-empty-s { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.04em; }
    .sm-hint {
      display: flex; justify-content: center; gap: 28px;
      padding: 22px 10px 22px 10px;
    }
    .sm-hint-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sm-hint-k {
      font-family: var(--font-mono); font-size: 11px;
      padding: 4px 9px; border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 5px; background: rgba(255,255,255,0.03);
      color: var(--accent);
    }
    .sm-hint-v {
      font-family: var(--font-mono); font-size: 9.5px;
      color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── Tweaks accent presets ──────────────────────────────────── */
    .accent-presets {
      display: flex; gap: 6px; margin-top: 2px;
    }
    .ap-swatch {
      width: 20px; height: 20px; border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.1); cursor: pointer;
      box-shadow: 0 0 8px currentColor;
      transition: transform 150ms;
    }
    .ap-swatch:hover { transform: scale(1.15); }
  </style>

  <!-- Pinned deps -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- D3 + composite projection + topojson -->
  <script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://unpkg.com/d3-composite-projections@1.4.0"></script>
  <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Plain JS: set up the data module -->
  <script type="text/babel" src="map-data.jsx"></script>
  <script type="text/babel" src="map-fx.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="spain-map.jsx"></script>
  <script type="text/babel" src="search.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
